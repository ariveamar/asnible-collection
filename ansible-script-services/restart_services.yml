---
# restart_services.yml
# ─────────────────────────────────────────────────────────────────────────────
# Playbook : Full restart — Execute stop scripts, then start scripts
# Usage    : ansible-playbook -i inventory/hosts.ini restart_services.yml
#          : ansible-playbook -i inventory/hosts.ini restart_services.yml \
#                -e "target_host_ip=10.0.0.50"
# ─────────────────────────────────────────────────────────────────────────────

- name: "RESTART SERVICES — Stop then Start via shell scripts"
  hosts: "{{ target_host_ip | default('app_servers') }}"
  become: true
  gather_facts: false

  vars:
    # ── TARGET SERVER IP ──────────────────────────────────────────────────────
    target_host_ip: "192.168.1.10"

    # ── STOP SCRIPTS ─────────────────────────────────────────────────────────
    stop_scripts:
      - label:       "App Service A"
        script_dir:  "/opt/services/app-a"
        script_file: "stop.sh"
        args:        ""

      - label:       "App Service B"
        script_dir:  "/opt/services/app-b"
        script_file: "stop.sh"
        args:        ""

      - label:       "Worker Service"
        script_dir:  "/home/deploy/worker"
        script_file: "stop-worker.sh"
        args:        "--graceful"

      - label:       "API Gateway"
        script_dir:  "/srv/gateway"
        script_file: "stop.sh"
        args:        ""

    # ── START SCRIPTS ─────────────────────────────────────────────────────────
    start_scripts:
      - label:       "App Service A"
        script_dir:  "/opt/services/app-a"
        script_file: "start.sh"
        args:        ""

      - label:       "App Service B"
        script_dir:  "/opt/services/app-b"
        script_file: "start.sh"
        args:        ""

      - label:       "Worker Service"
        script_dir:  "/home/deploy/worker"
        script_file: "start-worker.sh"
        args:        "--env production"

      - label:       "API Gateway"
        script_dir:  "/srv/gateway"
        script_file: "start.sh"
        args:        ""

    # ── EXECUTION SETTINGS ───────────────────────────────────────────────────
    stop_wait_seconds: 5
    start_wait_seconds: 10
    script_timeout: 120
    ignore_script_errors: false

  tasks:
    - name: "══════════════ PHASE 1 — STOP ALL SERVICES ══════════════"
      ansible.builtin.include_role:
        name: script_services
        tasks_from: main.yml

    - name: "Pause between stop and start phases"
      ansible.builtin.pause:
        seconds: 5
        prompt: "Waiting 5 seconds before starting services..."

    - name: "══════════════ PHASE 2 — START ALL SERVICES ══════════════"
      ansible.builtin.include_role:
        name: script_services
        tasks_from: start_main.yml
