---
# start_services.yml
# ─────────────────────────────────────────────────────────────────────────────
# Playbook : Start Linux services by executing shell scripts from defined directories
# Usage    : ansible-playbook -i inventory/hosts.ini start_services.yml
#          : ansible-playbook -i inventory/hosts.ini start_services.yml \
#                -e "target_host_ip=10.0.0.50"
# ─────────────────────────────────────────────────────────────────────────────

- name: "START SERVICES — Execute start scripts from defined directory locations"
  hosts: "{{ target_host_ip | default('app_servers') }}"
  become: true
  gather_facts: false

  vars:
    # ── TARGET SERVER IP ──────────────────────────────────────────────────────
    target_host_ip: "192.168.1.10"

    # ── START SCRIPT DIRECTORY LOCATIONS ─────────────────────────────────────
    start_scripts:
      - label:       "App Service A"
        script_dir:  "/opt/services/app-a"
        script_file: "start.sh"
        args:        ""

      - label:       "App Service B"
        script_dir:  "/opt/services/app-b"
        script_file: "start.sh"
        args:        ""

      - label:       "Worker Service"
        script_dir:  "/home/deploy/worker"
        script_file: "start-worker.sh"
        args:        "--env production"

      - label:       "API Gateway"
        script_dir:  "/srv/gateway"
        script_file: "start.sh"
        args:        ""

      - label:       "Background Scheduler"
        script_dir:  "/opt/scheduler"
        script_file: "startup.sh"
        args:        ""

    # ── EXECUTION SETTINGS ────────────────────────────────────────────────────
    start_wait_seconds: 10
    script_timeout: 120
    ignore_script_errors: false

  tasks:
    - name: "Run start sequence"
      ansible.builtin.include_role:
        name: script_services
        tasks_from: start_main.yml
