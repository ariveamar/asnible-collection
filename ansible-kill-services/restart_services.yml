---
# restart_services.yml
# ─────────────────────────────────────────────────────────────────────────────
# Playbook: Full restart — Stop all services (kill PIDs) then start via script
# Usage   : ansible-playbook -i inventory/hosts.ini restart_services.yml
#         : ansible-playbook -i inventory/hosts.ini restart_services.yml \
#               -e "target_host_ip=10.10.0.5"
# ─────────────────────────────────────────────────────────────────────────────

- name: "RESTART SERVICES — Stop (kill PID) then Start (shell script)"
  hosts: "{{ target_host_ip | default('app_servers') }}"
  become: true
  gather_facts: false

  vars:
    # ── TARGET SERVER ─────────────────────────────────────────────────────────
    target_host_ip: "192.168.1.10"

    # ── SERVICES LIST ─────────────────────────────────────────────────────────
    services_to_stop:
      - name: "nginx"
        kill_signal: "TERM"
        force_kill_enabled: true
      - name: "myapp"
        kill_signal: "TERM"
        force_kill_enabled: true
      - name: "java"
        kill_signal: "TERM"
        force_kill_enabled: true
      - name: "python3"
        kill_signal: "TERM"
        force_kill_enabled: true
      - name: "node"
        kill_signal: "TERM"
        force_kill_enabled: false

    # ── STOP SETTINGS ─────────────────────────────────────────────────────────
    stop_wait_seconds: 5
    force_kill_wait_seconds: 3
    max_retry_attempts: 3
    retry_delay_seconds: 3

    # ── START SETTINGS ────────────────────────────────────────────────────────
    start_script_path: "/home/start-service.sh"
    start_wait_seconds: 10

  tasks:
    - name: "────── PHASE 1: STOP ALL SERVICES ──────"
      ansible.builtin.include_role:
        name: kill_services
        tasks_from: main.yml

    - name: "====== PHASE SEPARATOR ======"
      ansible.builtin.debug:
        msg: "All services stopped. Waiting 5s before starting..."

    - name: "Pause between stop and start"
      ansible.builtin.pause:
        seconds: 5

    - name: "────── PHASE 2: START ALL SERVICES ──────"
      ansible.builtin.include_role:
        name: kill_services
        tasks_from: start_service.yml
      loop: "{{ services_to_stop }}"
      loop_control:
        loop_var: service_item
        label: "{{ service_item.name }}"
