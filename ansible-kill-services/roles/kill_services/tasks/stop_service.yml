---
# roles/kill_services/tasks/stop_service.yml
# Handles stop + validation + output for a single service item in the loop

# ─────────────────────────────────────────────────────────────────────────────
# STEP 1 — BANNER
# ─────────────────────────────────────────────────────────────────────────────
- name: "[ {{ service_item.name | upper }} ] ── BEGIN STOP SEQUENCE"
  ansible.builtin.debug:
    msg:
      - "────────────────────────────────────────────────────"
      - "  Service     : {{ service_item.name }}"
      - "  Target IP   : {{ target_host_ip }}"
      - "  Kill Signal : SIG{{ service_item.kill_signal }}"
      - "  Force Kill  : {{ service_item.force_kill_enabled }}"
      - "────────────────────────────────────────────────────"

# ─────────────────────────────────────────────────────────────────────────────
# STEP 2 — CHECK INITIAL PID
# FIX: Use 'ps aux | grep -w' pipeline instead of pgrep.
#      grep -v grep/ansible/sshd/python excludes the shell, Ansible process
#      and SSH daemon from results — avoids the $$ Jinja2 expansion bug.
# ─────────────────────────────────────────────────────────────────────────────
- name: "[ {{ service_item.name }} ] STEP 1 ─ Find running PIDs"
  ansible.builtin.shell: |
    set -o pipefail
    ps aux \
      | grep -w "{{ service_item.name }}" \
      | grep -v grep \
      | grep -v ansible \
      | grep -v sshd \
      | grep -v python \
      | awk '{print $2}' \
      || true
  args:
    executable: /bin/bash
  register: initial_pids
  changed_when: false

- name: "[ {{ service_item.name }} ] STEP 1 ─ Show initial PID status"
  ansible.builtin.debug:
    msg:
      - "Service    : {{ service_item.name }}"
      - "Status     : {{ 'RUNNING' if initial_pids.stdout | trim | length > 0 else 'NOT RUNNING / ALREADY STOPPED' }}"
      - "PID(s)     : {{ initial_pids.stdout_lines | join(', ') if initial_pids.stdout | trim | length > 0 else 'None' }}"

# ─────────────────────────────────────────────────────────────────────────────
# STEP 3 — SEND SIGTERM
# ─────────────────────────────────────────────────────────────────────────────
- name: "[ {{ service_item.name }} ] STEP 2 ─ Send SIG{{ service_item.kill_signal }} to all matching PIDs"
  ansible.builtin.shell: |
    set -o pipefail
    PIDS=$(ps aux \
      | grep -w "{{ service_item.name }}" \
      | grep -v grep \
      | grep -v ansible \
      | grep -v sshd \
      | grep -v python \
      | awk '{print $2}')
    if [ -n "$PIDS" ]; then
      echo "Sending SIG{{ service_item.kill_signal }} to PIDs: $PIDS"
      for PID in $PIDS; do
        echo "  → kill -{{ service_item.kill_signal }} PID $PID"
        kill -{{ service_item.kill_signal }} "$PID" 2>/dev/null || true
      done
    else
      echo "No PIDs found for {{ service_item.name }} — skipping kill"
    fi
  args:
    executable: /bin/bash
  register: kill_output
  changed_when: "'Sending SIG' in kill_output.stdout"
  when: initial_pids.stdout | trim | length > 0

- name: "[ {{ service_item.name }} ] STEP 2 ─ Show kill output"
  ansible.builtin.debug:
    msg: "{{ kill_output.stdout_lines }}"
  when: initial_pids.stdout | trim | length > 0

# ─────────────────────────────────────────────────────────────────────────────
# STEP 4 — WAIT for graceful shutdown
# ─────────────────────────────────────────────────────────────────────────────
- name: "[ {{ service_item.name }} ] STEP 3 ─ Wait {{ stop_wait_seconds }}s for graceful shutdown"
  ansible.builtin.pause:
    seconds: "{{ stop_wait_seconds }}"
  when: initial_pids.stdout | trim | length > 0

# ─────────────────────────────────────────────────────────────────────────────
# STEP 5 — RECHECK after SIGTERM
# ─────────────────────────────────────────────────────────────────────────────
- name: "[ {{ service_item.name }} ] STEP 4 ─ Re-check PIDs after graceful kill"
  ansible.builtin.shell: |
    set -o pipefail
    ps aux \
      | grep -w "{{ service_item.name }}" \
      | grep -v grep \
      | grep -v ansible \
      | grep -v sshd \
      | grep -v python \
      | awk '{print $2}' \
      || true
  args:
    executable: /bin/bash
  register: recheck_pids
  changed_when: false
  when: initial_pids.stdout | trim | length > 0

- name: "[ {{ service_item.name }} ] STEP 4 ─ Show recheck result"
  ansible.builtin.debug:
    msg:
      - "Re-check after SIG{{ service_item.kill_signal }}:"
      - "Status  : {{ 'STILL RUNNING — will force kill' if (recheck_pids.stdout | default('') | trim | length > 0) else 'STOPPED ✓' }}"
      - "PID(s)  : {{ recheck_pids.stdout_lines | join(', ') if (recheck_pids.stdout | default('') | trim | length > 0) else 'None' }}"
  when: initial_pids.stdout | trim | length > 0

# ─────────────────────────────────────────────────────────────────────────────
# STEP 6 — FORCE KILL with SIGKILL (if still running)
# ─────────────────────────────────────────────────────────────────────────────
- name: "[ {{ service_item.name }} ] STEP 5 ─ Force kill with SIGKILL (process still running)"
  ansible.builtin.shell: |
    set -o pipefail
    PIDS=$(ps aux \
      | grep -w "{{ service_item.name }}" \
      | grep -v grep \
      | grep -v ansible \
      | grep -v sshd \
      | grep -v python \
      | awk '{print $2}')
    if [ -n "$PIDS" ]; then
      echo "Force killing PIDs: $PIDS"
      for PID in $PIDS; do
        echo "  → kill -9 PID $PID"
        kill -9 "$PID" 2>/dev/null || true
      done
    fi
  args:
    executable: /bin/bash
  register: force_kill_output
  changed_when: "'Force killing' in force_kill_output.stdout"
  when:
    - initial_pids.stdout | trim | length > 0
    - service_item.force_kill_enabled | bool
    - recheck_pids.stdout | default('') | trim | length > 0

- name: "[ {{ service_item.name }} ] STEP 5 ─ Show force kill output"
  ansible.builtin.debug:
    msg: "{{ force_kill_output.stdout_lines }}"
  when:
    - force_kill_output is defined
    - force_kill_output.stdout | default('') | trim | length > 0

- name: "[ {{ service_item.name }} ] STEP 5 ─ Wait {{ force_kill_wait_seconds }}s after SIGKILL"
  ansible.builtin.pause:
    seconds: "{{ force_kill_wait_seconds }}"
  when:
    - initial_pids.stdout | trim | length > 0
    - service_item.force_kill_enabled | bool
    - recheck_pids.stdout | default('') | trim | length > 0

# ─────────────────────────────────────────────────────────────────────────────
# STEP 7 — RETRY VALIDATION
# ─────────────────────────────────────────────────────────────────────────────
- name: "[ {{ service_item.name }} ] STEP 6 ─ Validate process is fully stopped (retry {{ max_retry_attempts }}x)"
  ansible.builtin.shell: |
    set -o pipefail
    PIDS=$(ps aux \
      | grep -w "{{ service_item.name }}" \
      | grep -v grep \
      | grep -v ansible \
      | grep -v sshd \
      | grep -v python \
      | awk '{print $2}' \
      || true)
    PIDS=$(echo "$PIDS" | tr -d '[:space:]')
    if [ -z "$PIDS" ]; then
      echo "STOPPED"
    else
      echo "STILL_RUNNING: $PIDS"
      exit 1
    fi
  args:
    executable: /bin/bash
  register: final_validation
  retries: "{{ max_retry_attempts }}"
  delay: "{{ retry_delay_seconds }}"
  until: final_validation.rc == 0
  changed_when: false
  ignore_errors: true
  when: initial_pids.stdout | trim | length > 0

# ─────────────────────────────────────────────────────────────────────────────
# STEP 8 — FINAL OUTPUT
# FIX: tr -d '[:space:]' strips all whitespace from PIDS before the
#      [ -z ] check — prevents blank lines from being treated as a PID.
# ─────────────────────────────────────────────────────────────────────────────
- name: "[ {{ service_item.name }} ] STEP 7 ─ Final PID check output (confirm no PID running)"
  ansible.builtin.shell: |
    echo "=== PID Status for service: {{ service_item.name }} ==="
    echo "Timestamp : $(date '+%Y-%m-%d %H:%M:%S')"
    echo "Host IP   : {{ target_host_ip }}"
    echo ""
    PIDS=$(ps aux \
      | grep -w "{{ service_item.name }}" \
      | grep -v grep \
      | grep -v ansible \
      | grep -v sshd \
      | grep -v python \
      | awk '{print $2}' \
      || true)
    PIDS=$(echo "$PIDS" | tr -d '[:space:]')
    if [ -z "$PIDS" ]; then
      echo "STATUS    : ✅ STOPPED — No PID found for '{{ service_item.name }}'"
      echo "PID(s)    : None"
    else
      echo "STATUS    : ❌ STILL RUNNING — PIDs found: $PIDS"
      echo "PID(s)    : $PIDS"
    fi
    echo "======================================================="
  args:
    executable: /bin/bash
  register: final_output
  changed_when: false

- name: "[ {{ service_item.name }} ] STEP 7 ─ Display final stop result"
  ansible.builtin.debug:
    msg: "{{ final_output.stdout_lines }}"
