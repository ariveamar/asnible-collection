---
- name: Jira Approval Workflow with Mattermost Notifications
  hosts: localhost
  gather_facts: false

  # ---------------------------------------------------------------------------
  # Variables — override via -e flags, vars_file, or ansible-vault
  # ---------------------------------------------------------------------------
  vars_files:
    - "./vars_main.yml"


  # ---------------------------------------------------------------------------
  # Tasks
  # ---------------------------------------------------------------------------
  tasks:

    # -------------------------------------------------------------------------
    # TASK 1: Create Jira Ticket
    # Module : community.general.jira (operation: create)
    # Docs   : https://docs.ansible.com/ansible/latest/collections/community/general/jira_module.html
    # -------------------------------------------------------------------------
    - name: "TASK 1 | Create Jira ticket"
      community.general.jira:
        uri: "{{ jira_url }}"
        username: "{{ jira_user }}"
        password: "{{ jira_api_token }}"
        project: "{{ jira_project_key }}"
        issuetype: "{{ jira_issue_type }}"
        summary: "{{ jira_summary }}"
        description: "{{ jira_description }}"
        priority: "{{ jira_priority }}"
        operation: create
      register: jira_create_result

    - name: "TASK 1 | Extract ticket key, ID, and URL from result"
      ansible.builtin.set_fact:
        jira_issue_key: "{{ jira_create_result.meta.key }}"
        jira_issue_id: "{{ jira_create_result.meta.id }}"
        jira_issue_url: "{{ jira_url }}/browse/{{ jira_create_result.meta.key }}"

    - name: "TASK 1 | Display created ticket info"
      ansible.builtin.debug:
        msg:
          - "✅ Jira ticket created successfully"
          - "   Ticket Key : {{ jira_issue_key }}"
          - "   Ticket ID  : {{ jira_issue_id }}"
          - "   URL        : {{ jira_issue_url }}"

    # -------------------------------------------------------------------------
    # TASK 2: Assign Approver & Add Approval Comment
    # Module : community.general.jira (operations: edit + comment)
    # -------------------------------------------------------------------------
    - name: "TASK 2 | Assign ticket to approver"
      community.general.jira:
        uri: "{{ jira_url }}"
        username: "{{ jira_user }}"
        password: "{{ jira_api_token }}"
        issue: "{{ jira_issue_key }}"
        operation: edit
        assignee: "{{ jira_approver_username }}"

    - name: "TASK 2 | Add approval-request comment mentioning approver"
      community.general.jira:
        uri: "{{ jira_url }}"
        username: "{{ jira_user }}"
        password: "{{ jira_api_token }}"
        issue: "{{ jira_issue_key }}"
        operation: comment
        comment: >
          Approval requested. {{ jira_approver_display }} — please review and
          approve or deny this request. This ticket was created automatically
          by Ansible. Ticket URL: {{ jira_issue_url }}

    - name: "TASK 2 | Confirm approver assignment"
      ansible.builtin.debug:
        msg: "✅ Approver '{{ jira_approver_username }}' assigned to {{ jira_issue_key }}"

    # -------------------------------------------------------------------------
    # TASK 3: Send Mattermost Notification — Ticket Created
    # Module : community.general.mattermost
    # Docs   : https://docs.ansible.com/ansible/latest/collections/community/general/mattermost_module.html
    # -------------------------------------------------------------------------
    - name: "TASK 3 | Send Mattermost notification — ticket created"
      community.general.mattermost:
        url: "{{ mattermost_url }}"
        api_key: "{{ mattermost_api_key }}"
        channel_id: "{{ mattermost_channel }}"
        username: "{{ mattermost_username }}"
        text: |
          ## 🎫 New Jira Approval Ticket Created
          | Field        | Value |
          |--------------|-------|
          | **Ticket**   | [{{ jira_issue_key }}]({{ jira_issue_url }}) |
          | **ID**       | `{{ jira_issue_id }}` |
          | **Summary**  | {{ jira_summary }} |
          | **Assignee** | {{ jira_approver_display }} |
          | **Status**   | 🟡 Awaiting Approval |

          > Approver has been notified. Waiting for approval...

    - name: "TASK 3 | Confirm Mattermost notification sent"
      ansible.builtin.debug:
        msg: "✅ Mattermost notification sent — ticket {{ jira_issue_key }} created"

    # -------------------------------------------------------------------------
    # TASK 4: Poll Jira Until Ticket Status Is "Approved"
    # Module : community.general.jira (operation: fetch)
    # -------------------------------------------------------------------------
    - name: "TASK 4 | Poll Jira ticket status until approved"
      community.general.jira:
        uri: "{{ jira_url }}"
        username: "{{ jira_user }}"
        password: "{{ jira_api_token }}"
        issue: "{{ jira_issue_key }}"
        operation: fetch
      register: jira_poll_result
      until: jira_poll_result.meta.fields.status.name == jira_approved_status
      retries: "{{ approval_poll_max_retries }}"
      delay: "{{ approval_poll_interval_seconds }}"
      failed_when: false  # Prevent hard-fail on retry exhaustion; handled gracefully below

    - name: "TASK 4 | Capture final ticket status"
      ansible.builtin.set_fact:
        jira_final_status: "{{ jira_poll_result.meta.fields.status.name }}"

    - name: "TASK 4 | Fail gracefully if approval timed out"
      ansible.builtin.fail:
        msg: >
          ❌ Ticket {{ jira_issue_key }} was NOT approved within the allotted time.
          Final status : '{{ jira_final_status }}'.
          Max wait     : {{ (approval_poll_max_retries | int) * (approval_poll_interval_seconds | int) }} seconds.
          Check ticket : {{ jira_issue_url }}
      when: jira_final_status != jira_approved_status

    - name: "TASK 4 | Log approval confirmation"
      ansible.builtin.debug:
        msg: "✅ Ticket {{ jira_issue_key }} has been APPROVED (status: {{ jira_final_status }})"

    # -------------------------------------------------------------------------
    # TASK 5: Send Mattermost Notification — Ticket Approved
    # Module : community.general.mattermost
    # -------------------------------------------------------------------------
    - name: "TASK 5 | Send Mattermost notification — ticket approved"
      community.general.mattermost:
        url: "{{ mattermost_url }}"
        api_key: "{{ mattermost_api_key }}"
        channel_id: "{{ mattermost_channel }}"
        username: "{{ mattermost_username }}"
        text: |
          ## ✅ Jira Ticket Approved!
          | Field        | Value |
          |--------------|-------|
          | **Ticket**   | [{{ jira_issue_key }}]({{ jira_issue_url }}) |
          | **ID**       | `{{ jira_issue_id }}` |
          | **Summary**  | {{ jira_summary }} |
          | **Assignee** | {{ jira_approver_display }} |
          | **Status**   | 🟢 **APPROVED** |

          > The request has been approved. Proceeding with the automated workflow.

    - name: "TASK 5 | Confirm approval notification sent"
      ansible.builtin.debug:
        msg: "✅ Mattermost approval notification sent for ticket {{ jira_issue_key }}"

    # -------------------------------------------------------------------------
    # Summary
    # -------------------------------------------------------------------------
    - name: "SUMMARY | Workflow completed successfully"
      ansible.builtin.debug:
        msg:
          - "============================================"
          - " Jira Approval Workflow — COMPLETE"
          - "============================================"
          - " Ticket Key  : {{ jira_issue_key }}"
          - " Ticket ID   : {{ jira_issue_id }}"
          - " Final Status: {{ jira_final_status }}"
          - " URL         : {{ jira_issue_url }}"
          - "============================================"
