---
# start_services.yml
# ─────────────────────────────────────────────────────────────────────────────
# Playbook : Start Linux services by executing shell scripts from defined
#            directory locations on a target server.
#
# Usage    :
#   # Run with default IP from vars
#   ansible-playbook -i inventory/hosts.ini start_services.yml
#
#   # Override target IP at runtime
#   ansible-playbook -i inventory/hosts.ini start_services.yml \
#       -e "target_host_ip=10.0.0.50"
#
#   # Continue even if one script fails
#   ansible-playbook -i inventory/hosts.ini start_services.yml \
#       -e "ignore_script_errors=true"
#
#   # Dry run (check mode — skips actual script execution)
#   ansible-playbook -i inventory/hosts.ini start_services.yml --check
#
#   # Verbose output
#   ansible-playbook -i inventory/hosts.ini start_services.yml -v
# ─────────────────────────────────────────────────────────────────────────────

- name: "START SERVICES — Execute start scripts from defined directory locations"
  hosts: "{{ target_host_ip | default('app_servers') }}"
  become: true
  gather_facts: false

  vars:
    # ── TARGET SERVER IP ──────────────────────────────────────────────────────
    # IP of the server where the start scripts will be executed.
    # Must match the ansible_host value defined in inventory/hosts.ini.
    # ─────────────────────────────────────────────────────────────────────────
    target_host_ip: "192.168.80.33"

    # ── START SCRIPT LOCATIONS ────────────────────────────────────────────────
    # List of all services to start.
    # The playbook loops through every entry and executes each script in order.
    #
    # Fields:
    #   label       : Friendly name shown in output and logs
    #   script_dir  : Full path of the directory on the target host
    #   script_file : Shell script filename to execute
    #   args        : Optional arguments passed to the script (use "" for none)
    # ─────────────────────────────────────────────────────────────────────────
    start_scripts:
      - label:       "node_exporter"
        script_dir:  "/home/"
        script_file: "start-service.sh"
        args:        ""
        process_name: "node_exporter"

#      - label:       "App Service B"
#        script_dir:  "/opt/services/app-b"
#        script_file: "start.sh"
#        args:        ""

#      - label:       "Worker Service"
#        script_dir:  "/home/deploy/worker"
#        script_file: "start-worker.sh"
#        args:        "--env production"

#      - label:       "API Gateway"
#        script_dir:  "/srv/gateway"
#        script_file: "start.sh"
#        args:        ""

 #     - label:       "Background Scheduler"
 #       script_dir:  "/opt/scheduler"
 #       script_file: "startup.sh"
 #       args:        ""

    # ── EXECUTION SETTINGS ────────────────────────────────────────────────────
    start_wait_seconds: 10       # Seconds to wait after each script before verifying
    script_timeout: 120          # Max seconds allowed for each script to finish
    ignore_script_errors: false  # true = continue loop even if a script fails

  roles:
    - start_services
