---
# roles/start_services/tasks/main.yml
# Entry point — prints execution plan then loops through all start scripts

- name: "Display execution plan"
  ansible.builtin.debug:
    msg:
      - "╔══════════════════════════════════════════════════════════════════╗"
      - "  ACTION        : START SERVICES VIA SHELL SCRIPT                  "
      - "  TARGET IP     : {{ target_host_ip }}                             "
      - "  TOTAL SCRIPTS : {{ start_scripts | length }}                     "
      - "  SERVICES      : {{ start_scripts | map(attribute='label') | list | join(', ') }}"
      - "╚══════════════════════════════════════════════════════════════════╝"

- name: "Execute start script for each service (loop)"
  ansible.builtin.include_tasks: start_service.yml
  loop: "{{ start_scripts }}"
  loop_control:
    loop_var: script_item
    label: "{{ script_item.label }} → {{ script_item.script_dir }}/{{ script_item.script_file }}"

- name: "════════════════ START SEQUENCE COMPLETE ════════════════"
  ansible.builtin.debug:
    msg:
      - "All start scripts have been executed on {{ target_host_ip }}"
      - "Services processed : {{ start_scripts | map(attribute='label') | list | join(', ') }}"
      - "Timestamp          : {{ lookup('pipe', 'date +\"%Y-%m-%d %H:%M:%S\"') }}"
