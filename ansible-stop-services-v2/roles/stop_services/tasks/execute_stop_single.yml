---
# roles/stop_services/tasks/execute_stop_single.yml
# ─────────────────────────────────────────────────────────────────────────────
# Executes stop script for ONE service.
# Called by execute_stop.yml via include_tasks.
# Reads is_running flag from preflight_results to decide stop vs skip.
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# Resolve this service's pre-flight result into a local fact for clean access
# ─────────────────────────────────────────────────────────────────────────────
- name: "EXECUTE | [ {{ script_item.label }} ] Load preflight result for this service"
  ansible.builtin.set_fact:
    svc_result: "{{ preflight_results[script_item.label] }}"

# ─────────────────────────────────────────────────────────────────────────────
# BANNER — always shown, includes pre-flight data for context
# ─────────────────────────────────────────────────────────────────────────────
- name: "EXECUTE | [ {{ script_item.label | upper }} ] ── BEGIN SERVICE PROCESSING"
  ansible.builtin.debug:
    msg:
      - "┌────────────────────────────────────────────────────────────────┐"
      - "  Label          : {{ script_item.label }}"
      - "  Target IP      : {{ target_host_ip }}"
      - "  Process Name   : {{ script_item.process_name }}"
      - "  Pre-Flight PID : {{ svc_result.pids if svc_result.pids else 'None' }}"
      - "  Pre-Flight At  : {{ svc_result.checked_at }}"
      - "  Decision       : {{ '🛑 PROCEED WITH STOP' if svc_result.is_running else '⏭️  SKIP — NOT RUNNING' }}"
      - "  Directory      : {{ script_item.script_dir }}"
      - "  Script File    : {{ script_item.script_file }}"
      - "  Arguments      : {{ script_item.args | default('(none)') }}"
      - "└────────────────────────────────────────────────────────────────┘"

# ─────────────────────────────────────────────────────────────────────────────
# SKIP NOTICE — shown cleanly when service is not running
# ─────────────────────────────────────────────────────────────────────────────
- name: "EXECUTE | [ {{ script_item.label }} ] ⏭️  SKIPPED — process '{{ script_item.process_name }}' is not running"
  ansible.builtin.debug:
    msg:
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - "  ⏭️  SKIP: '{{ script_item.label }}' — process '{{ script_item.process_name }}' had no active PIDs"
      - "  Pre-flight checked at : {{ svc_result.checked_at }}"
      - "  Stop script will NOT be executed — proceeding to next service."
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
  when: not svc_result.is_running

# ═══════════════════════════════════════════════════════════════════════════
# ALL STEPS BELOW ONLY RUN WHEN svc_result.is_running == true
# ═══════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
# STEP 1 — Validate directory exists on target
# ─────────────────────────────────────────────────────────────────────────────
- name: "EXECUTE | [ {{ script_item.label }} ] STEP 1 ─ Check script directory exists"
  ansible.builtin.stat:
    path: "{{ script_item.script_dir }}"
  register: dir_stat
  when: svc_result.is_running

- name: "EXECUTE | [ {{ script_item.label }} ] STEP 1 ─ Assert directory exists"
  ansible.builtin.assert:
    that:
      - dir_stat.stat.exists
      - dir_stat.stat.isdir
    fail_msg: >
      ❌ Directory '{{ script_item.script_dir }}' does NOT exist on {{ target_host_ip }}.
      Verify script_dir in your variable definition.
    success_msg: "✅ Directory confirmed: {{ script_item.script_dir }}"
  when: svc_result.is_running

# ─────────────────────────────────────────────────────────────────────────────
# STEP 2 — Validate script file exists
# ─────────────────────────────────────────────────────────────────────────────
- name: "EXECUTE | [ {{ script_item.label }} ] STEP 2 ─ Check script file exists"
  ansible.builtin.stat:
    path: "{{ script_item.script_dir }}/{{ script_item.script_file }}"
  register: script_stat
  when: svc_result.is_running

- name: "EXECUTE | [ {{ script_item.label }} ] STEP 2 ─ Assert script file exists"
  ansible.builtin.assert:
    that:
      - script_stat.stat.exists
      - script_stat.stat.isreg
    fail_msg: >
      ❌ Script '{{ script_item.script_file }}' NOT found in '{{ script_item.script_dir }}'.
      Full path: {{ script_item.script_dir }}/{{ script_item.script_file }}
    success_msg: "✅ Script confirmed: {{ script_item.script_dir }}/{{ script_item.script_file }}"
  when: svc_result.is_running

# ─────────────────────────────────────────────────────────────────────────────
# STEP 3 — Ensure script is executable
# ─────────────────────────────────────────────────────────────────────────────
- name: "EXECUTE | [ {{ script_item.label }} ] STEP 3 ─ Ensure script is executable (chmod 0755)"
  ansible.builtin.file:
    path: "{{ script_item.script_dir }}/{{ script_item.script_file }}"
    mode: "0755"
  when: svc_result.is_running

# ─────────────────────────────────────────────────────────────────────────────
# STEP 4 — Execute the stop script (chdir to script's own directory)
# ─────────────────────────────────────────────────────────────────────────────
- name: "EXECUTE | [ {{ script_item.label }} ] STEP 4 ─ Run stop script: {{ script_item.script_dir }}/{{ script_item.script_file }}"
  ansible.builtin.shell:
    cmd: "./{{ script_item.script_file }} {{ script_item.args | default('') }}"
    chdir: "{{ script_item.script_dir }}"
  args:
    executable: /bin/bash
  register: script_result
  ignore_errors: "{{ ignore_script_errors | default(false) }}"
  async: "{{ script_timeout | default(120) }}"
  poll: 5
  when: svc_result.is_running

# ─────────────────────────────────────────────────────────────────────────────
# STEP 5 — Display STDOUT from the stop script
# ─────────────────────────────────────────────────────────────────────────────
- name: "EXECUTE | [ {{ script_item.label }} ] STEP 5 ─ Script STDOUT output"
  ansible.builtin.debug:
    msg:
      - "┌─────────────────────────── STDOUT ────────────────────────────┐"
      - "  Service      : {{ script_item.label }}"
      - "  Script       : {{ script_item.script_dir }}/{{ script_item.script_file }}"
      - "  Process Name : {{ script_item.process_name }}"
      - "  Target IP    : {{ target_host_ip }}"
      - "  Exit Code    : {{ script_result.rc }}"
      - "  Status       : {{ '✅ SUCCESS (rc=0)' if script_result.rc == 0 else '❌ FAILED (rc=' + script_result.rc | string + ')' }}"
      - "├───────────────────────────────────────────────────────────────┤"
      - "{{ script_result.stdout_lines if script_result.stdout_lines | length > 0 else ['  (no stdout output from script)'] }}"
      - "└───────────────────────────────────────────────────────────────┘"
  when: svc_result.is_running

# ─────────────────────────────────────────────────────────────────────────────
# STEP 6 — Display STDERR (only when non-empty)
# ─────────────────────────────────────────────────────────────────────────────
- name: "EXECUTE | [ {{ script_item.label }} ] STEP 6 ─ Script STDERR output"
  ansible.builtin.debug:
    msg:
      - "┌─────────────────────────── STDERR ────────────────────────────┐"
      - "{{ script_result.stderr_lines }}"
      - "└───────────────────────────────────────────────────────────────┘"
  when:
    - svc_result.is_running
    - script_result.stderr | default('') | trim | length > 0

# ─────────────────────────────────────────────────────────────────────────────
# STEP 7 — Assert script exited with rc=0
# ─────────────────────────────────────────────────────────────────────────────
- name: "EXECUTE | [ {{ script_item.label }} ] STEP 7 ─ Assert script completed successfully (rc=0)"
  ansible.builtin.assert:
    that:
      - script_result.rc == 0
    fail_msg: >
      ❌ FAILED: '{{ script_item.script_dir }}/{{ script_item.script_file }}'
      exited with code {{ script_result.rc }} on {{ target_host_ip }}.
      STDERR: {{ script_result.stderr | default('None') }}
    success_msg: >
      ✅ PASSED: '{{ script_item.script_dir }}/{{ script_item.script_file }}'
      completed successfully (rc=0) on {{ target_host_ip }}.
  when:
    - svc_result.is_running
    - not (ignore_script_errors | default(false))

# ─────────────────────────────────────────────────────────────────────────────
# STEP 8 — Wait for service to shut down
# ─────────────────────────────────────────────────────────────────────────────
- name: "EXECUTE | [ {{ script_item.label }} ] STEP 8 ─ Wait {{ stop_wait_seconds }}s for service to shut down"
  ansible.builtin.pause:
    seconds: "{{ stop_wait_seconds | default(5) }}"
  when: svc_result.is_running

# ─────────────────────────────────────────────────────────────────────────────
# STEP 9 — Final PID verification using process_name
# tr -d '[:space:]' prevents blank-line false positives
# ─────────────────────────────────────────────────────────────────────────────
- name: "EXECUTE | [ {{ script_item.label }} ] STEP 9 ─ Final PID verification (process_name: '{{ script_item.process_name }}')"
  ansible.builtin.shell: |
    set -o pipefail
    PIDS=$(ps aux \
      | grep -w "{{ script_item.process_name }}" \
      | grep -v grep \
      | grep -v ansible \
      | grep -v sshd \
      | grep -v python \
      | awk '{print $2}' \
      || true)
    PIDS=$(echo "$PIDS" | tr -d '[:space:]')

    echo "=== Final Stop Verification ==="
    echo "Timestamp    : $(date '+%Y-%m-%d %H:%M:%S')"
    echo "Host IP      : {{ target_host_ip }}"
    echo "Service      : {{ script_item.label }}"
    echo "Process Name : {{ script_item.process_name }}"
    echo "Script       : {{ script_item.script_dir }}/{{ script_item.script_file }}"
    echo ""
    if [ -z "$PIDS" ]; then
      echo "STATUS       : ✅ STOPPED — No PID found for '{{ script_item.process_name }}'"
      echo "PID(s)       : None"
    else
      echo "STATUS       : ⚠️  PROCESS STILL DETECTED"
      echo "PID(s)       : $PIDS"
      echo "NOTE         : Stop script ran (rc={{ script_result.rc }}) but process may still be shutting down."
      echo "               Increase stop_wait_seconds or review the stop script."
    fi
    echo "================================="
  args:
    executable: /bin/bash
  register: final_verify
  changed_when: false
  when: svc_result.is_running

- name: "EXECUTE | [ {{ script_item.label }} ] STEP 9 ─ Display final verification result"
  ansible.builtin.debug:
    msg: "{{ final_verify.stdout_lines }}"
  when: svc_result.is_running
