---
# roles/stop_services/tasks/stop_service.yml
# Full stop sequence per service:
#   banner → validate vars → validate dir → validate file → chmod
#   → PRE-FLIGHT CHECK (PID status) → SKIP if not running
#   → execute stop script → stdout/stderr → assert → wait → final verify

# ─────────────────────────────────────────────────────────────────────────────
# BANNER
# ─────────────────────────────────────────────────────────────────────────────
- name: "[ {{ script_item.label | upper }} ] ── BEGIN STOP SEQUENCE"
  ansible.builtin.debug:
    msg:
      - "┌────────────────────────────────────────────────────────────────┐"
      - "  Label        : {{ script_item.label }}"
      - "  Target IP    : {{ target_host_ip }}"
      - "  Directory    : {{ script_item.script_dir }}"
      - "  Script File  : {{ script_item.script_file }}"
      - "  Process Name : {{ script_item.process_name }}"
      - "  Arguments    : {{ script_item.args | default('(none)') }}"
      - "  Full Path    : {{ script_item.script_dir }}/{{ script_item.script_file }}"
      - "└────────────────────────────────────────────────────────────────┘"

# ─────────────────────────────────────────────────────────────────────────────
# STEP 1 — Validate process_name is defined and not empty
# Catches missing or blank process_name before any remote task runs.
# ─────────────────────────────────────────────────────────────────────────────
- name: "[ {{ script_item.label }} ] STEP 1 ─ Validate process_name is defined"
  ansible.builtin.assert:
    that:
      - script_item.process_name is defined
      - script_item.process_name | trim | length > 0
    fail_msg: >
      ❌ 'process_name' is missing or empty for service '{{ script_item.label }}'.
      Please set process_name to the exact process name visible in 'ps aux' output.
      Example: process_name: "nginx"
    success_msg: "✅ process_name confirmed: '{{ script_item.process_name }}'"

# ─────────────────────────────────────────────────────────────────────────────
# STEP 2 — Validate directory exists
# ─────────────────────────────────────────────────────────────────────────────
- name: "[ {{ script_item.label }} ] STEP 2 ─ Check script directory exists"
  ansible.builtin.stat:
    path: "{{ script_item.script_dir }}"
  register: dir_stat

- name: "[ {{ script_item.label }} ] STEP 2 ─ Assert directory exists"
  ansible.builtin.assert:
    that:
      - dir_stat.stat.exists
      - dir_stat.stat.isdir
    fail_msg: >
      ❌ Directory '{{ script_item.script_dir }}' does NOT exist on {{ target_host_ip }}.
      Please verify script_dir in your variable definition.
    success_msg: "✅ Directory confirmed: {{ script_item.script_dir }}"

# ─────────────────────────────────────────────────────────────────────────────
# STEP 3 — Validate script file exists
# ─────────────────────────────────────────────────────────────────────────────
- name: "[ {{ script_item.label }} ] STEP 3 ─ Check script file exists"
  ansible.builtin.stat:
    path: "{{ script_item.script_dir }}/{{ script_item.script_file }}"
  register: script_stat

- name: "[ {{ script_item.label }} ] STEP 3 ─ Assert script file exists"
  ansible.builtin.assert:
    that:
      - script_stat.stat.exists
      - script_stat.stat.isreg
    fail_msg: >
      ❌ Script '{{ script_item.script_file }}' NOT found in '{{ script_item.script_dir }}' on {{ target_host_ip }}.
      Full path checked: {{ script_item.script_dir }}/{{ script_item.script_file }}
    success_msg: "✅ Script file confirmed: {{ script_item.script_dir }}/{{ script_item.script_file }}"

# ─────────────────────────────────────────────────────────────────────────────
# STEP 4 — Ensure script is executable
# ─────────────────────────────────────────────────────────────────────────────
- name: "[ {{ script_item.label }} ] STEP 4 ─ Ensure script is executable (chmod 0755)"
  ansible.builtin.file:
    path: "{{ script_item.script_dir }}/{{ script_item.script_file }}"
    mode: "0755"

# ─────────────────────────────────────────────────────────────────────────────
# STEP 5 — PRE-FLIGHT PROCESS STATUS CHECK
# Queries ps aux using process_name to find all running PIDs.
# Collects full process details (PID, CPU, MEM, start time, command).
# Safe ps+grep pipeline — avoids the $$ Jinja2 expansion bug.
# tr -d '[:space:]' strips whitespace to prevent blank-line false positives.
# Registers `pre_flight_check` which is used in ALL subsequent steps
# to decide whether to proceed or skip the stop sequence entirely.
# ─────────────────────────────────────────────────────────────────────────────
- name: "[ {{ script_item.label }} ] STEP 5 ─ PRE-FLIGHT: Check current process status (process_name: '{{ script_item.process_name }}')"
  ansible.builtin.shell: |
    set -o pipefail
    # Collect matching process rows (full detail) excluding helper processes
    PROCESS_ROWS=$(ps aux \
      | grep -w "{{ script_item.process_name }}" \
      | grep -v grep \
      | grep -v ansible \
      | grep -v sshd \
      | grep -v python \
      || true)

    # Extract PID column only, strip all whitespace for the boolean check
    PIDS=$(echo "$PROCESS_ROWS" | awk '{print $2}' | tr -d '[:space:]')

    echo "╔══════════════════════════════════════════════════════════════╗"
    echo "  PRE-FLIGHT PROCESS STATUS CHECK"
    echo "  Timestamp    : $(date '+%Y-%m-%d %H:%M:%S')"
    echo "  Host IP      : {{ target_host_ip }}"
    echo "  Service      : {{ script_item.label }}"
    echo "  Process Name : {{ script_item.process_name }}"
    echo "╠══════════════════════════════════════════════════════════════╣"

    if [ -n "$PIDS" ]; then
      echo "  STATUS       : ✅ RUNNING"
      echo "  PID(s)       : $PIDS"
      echo "  DECISION     : Will proceed with stop script execution"
      echo "╠══════════════════════════════════════════════════════════════╣"
      echo "  PROCESS DETAILS (ps aux):"
      echo "  USER       PID  %CPU %MEM    VSZ   RSS  STAT START   TIME COMMAND"
      echo "$PROCESS_ROWS" | while IFS= read -r line; do
        echo "  $line"
      done
      echo "╚══════════════════════════════════════════════════════════════╝"
      # Exit 0 = running → proceed with stop
      exit 0
    else
      echo "  STATUS       : ⏭️  NOT RUNNING"
      echo "  PID(s)       : None"
      echo "  DECISION     : Stop script will be SKIPPED — nothing to stop"
      echo "╚══════════════════════════════════════════════════════════════╝"
      # Exit 2 = not running → skip stop (not an error)
      exit 2
    fi
  args:
    executable: /bin/bash
  register: pre_flight_check
  changed_when: false
  # rc=0 → running, rc=2 → not running — both are expected, neither is a failure
  failed_when: pre_flight_check.rc not in [0, 2]

# ─────────────────────────────────────────────────────────────────────────────
# STEP 5a — Display the pre-flight check output
# ─────────────────────────────────────────────────────────────────────────────
- name: "[ {{ script_item.label }} ] STEP 5 ─ Display pre-flight process status"
  ansible.builtin.debug:
    msg: "{{ pre_flight_check.stdout_lines }}"

# ─────────────────────────────────────────────────────────────────────────────
# STEP 5b — Register boolean flag: service_is_running
# All steps from STEP 6 onward use `when: service_is_running` so they are
# cleanly skipped as a group when the process is not running (rc=2).
# ─────────────────────────────────────────────────────────────────────────────
- name: "[ {{ script_item.label }} ] STEP 5 ─ Set service_is_running flag"
  ansible.builtin.set_fact:
    service_is_running: "{{ pre_flight_check.rc == 0 }}"

# ─────────────────────────────────────────────────────────────────────────────
# SKIP NOTICE — shown only when process is NOT running
# ─────────────────────────────────────────────────────────────────────────────
- name: "[ {{ script_item.label }} ] ⏭️  SKIPPED — Process '{{ script_item.process_name }}' is not running"
  ansible.builtin.debug:
    msg:
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - "  ⏭️  SKIP: Service '{{ script_item.label }}' is NOT currently running."
      - "  Process '{{ script_item.process_name }}' has no active PIDs on {{ target_host_ip }}."
      - "  Stop script will NOT be executed — moving to next service."
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
  when: not service_is_running

# ═════════════════════════════════════════════════════════════════════════════
# ALL STEPS BELOW ARE GATED BY: when: service_is_running
# They execute ONLY when the pre-flight check confirmed the process is running.
# ═════════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
# STEP 6 — Execute the stop script from its own directory (chdir)
# chdir ensures scripts using relative paths inside them work correctly.
# async + poll allows real-time progress without blocking indefinitely.
# ─────────────────────────────────────────────────────────────────────────────
- name: "[ {{ script_item.label }} ] STEP 6 ─ Execute stop script: {{ script_item.script_dir }}/{{ script_item.script_file }}"
  ansible.builtin.shell:
    cmd: "./{{ script_item.script_file }} {{ script_item.args | default('') }}"
    chdir: "{{ script_item.script_dir }}"
  args:
    executable: /bin/bash
  register: script_result
  ignore_errors: "{{ ignore_script_errors | default(false) }}"
  async: "{{ script_timeout | default(120) }}"
  poll: 5
  when: service_is_running

# ─────────────────────────────────────────────────────────────────────────────
# STEP 7 — Display full STDOUT from the script
# ─────────────────────────────────────────────────────────────────────────────
- name: "[ {{ script_item.label }} ] STEP 7 ─ Script STDOUT output"
  ansible.builtin.debug:
    msg:
      - "┌─────────────────────────── STDOUT ────────────────────────────┐"
      - "  Service      : {{ script_item.label }}"
      - "  Script       : {{ script_item.script_dir }}/{{ script_item.script_file }}"
      - "  Process Name : {{ script_item.process_name }}"
      - "  Target IP    : {{ target_host_ip }}"
      - "  Exit Code    : {{ script_result.rc }}"
      - "  Status       : {{ '✅ SUCCESS (rc=0)' if script_result.rc == 0 else '❌ FAILED (rc=' + script_result.rc | string + ')' }}"
      - "├───────────────────────────────────────────────────────────────┤"
      - "{{ script_result.stdout_lines if script_result.stdout_lines | length > 0 else ['  (no stdout output from script)'] }}"
      - "└───────────────────────────────────────────────────────────────┘"
  when: service_is_running

# ─────────────────────────────────────────────────────────────────────────────
# STEP 8 — Display STDERR (only shown when stderr is non-empty)
# ─────────────────────────────────────────────────────────────────────────────
- name: "[ {{ script_item.label }} ] STEP 8 ─ Script STDERR output"
  ansible.builtin.debug:
    msg:
      - "┌─────────────────────────── STDERR ────────────────────────────┐"
      - "{{ script_result.stderr_lines }}"
      - "└───────────────────────────────────────────────────────────────┘"
  when:
    - service_is_running
    - script_result.stderr | default('') | trim | length > 0

# ─────────────────────────────────────────────────────────────────────────────
# STEP 9 — Assert script exited with rc=0
# ─────────────────────────────────────────────────────────────────────────────
- name: "[ {{ script_item.label }} ] STEP 9 ─ Assert script completed successfully (rc=0)"
  ansible.builtin.assert:
    that:
      - script_result.rc == 0
    fail_msg: >
      ❌ FAILED: Script '{{ script_item.script_dir }}/{{ script_item.script_file }}'
      exited with code {{ script_result.rc }} on {{ target_host_ip }}.
      STDERR: {{ script_result.stderr | default('None') }}
    success_msg: >
      ✅ PASSED: Script '{{ script_item.script_dir }}/{{ script_item.script_file }}'
      completed successfully (rc=0) on {{ target_host_ip }}.
  when:
    - service_is_running
    - not (ignore_script_errors | default(false))

# ─────────────────────────────────────────────────────────────────────────────
# STEP 10 — Wait for service to fully shut down before verifying
# ─────────────────────────────────────────────────────────────────────────────
- name: "[ {{ script_item.label }} ] STEP 10 ─ Wait {{ stop_wait_seconds }}s for service to shut down"
  ansible.builtin.pause:
    seconds: "{{ stop_wait_seconds | default(5) }}"
  when: service_is_running

# ─────────────────────────────────────────────────────────────────────────────
# STEP 11 — Final PID verification after stop
# Confirms process is fully gone using the same safe ps+grep pipeline.
# ─────────────────────────────────────────────────────────────────────────────
- name: "[ {{ script_item.label }} ] STEP 11 ─ Final PID verification (process_name: '{{ script_item.process_name }}')"
  ansible.builtin.shell: |
    set -o pipefail
    PIDS=$(ps aux \
      | grep -w "{{ script_item.process_name }}" \
      | grep -v grep \
      | grep -v ansible \
      | grep -v sshd \
      | grep -v python \
      | awk '{print $2}' \
      || true)
    PIDS=$(echo "$PIDS" | tr -d '[:space:]')

    echo "=== Final Stop Verification ==="
    echo "Timestamp    : $(date '+%Y-%m-%d %H:%M:%S')"
    echo "Host IP      : {{ target_host_ip }}"
    echo "Service      : {{ script_item.label }}"
    echo "Process Name : {{ script_item.process_name }}"
    echo "Script       : {{ script_item.script_dir }}/{{ script_item.script_file }}"
    echo ""
    if [ -z "$PIDS" ]; then
      echo "STATUS       : ✅ STOPPED — No PID found for process '{{ script_item.process_name }}'"
      echo "PID(s)       : None"
    else
      echo "STATUS       : ⚠️  PROCESS STILL DETECTED"
      echo "PID(s)       : $PIDS"
      echo "NOTE         : Stop script ran (rc={{ script_result.rc }}) but process may still be shutting down."
      echo "               Increase stop_wait_seconds or check the stop script logic."
    fi
    echo "================================="
  args:
    executable: /bin/bash
  register: final_verify
  changed_when: false
  when: service_is_running

- name: "[ {{ script_item.label }} ] STEP 11 ─ Display final verification result"
  ansible.builtin.debug:
    msg: "{{ final_verify.stdout_lines }}"
  when: service_is_running
