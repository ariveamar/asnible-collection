# inventory/hosts.ini
# ─────────────────────────────────────────────────────────────────────────────
# Define all target servers here.
# The playbook uses target_host_ip to match ansible_host and determine
# which server the stop scripts will be executed on.
# ─────────────────────────────────────────────────────────────────────────────

[app_servers]
server1  ansible_host=192.168.1.10  ansible_user=ec2-user  ansible_ssh_private_key_file=~/.ssh/id_rsa
server2  ansible_host=192.168.1.11  ansible_user=ec2-user  ansible_ssh_private_key_file=~/.ssh/id_rsa

[db_servers]
db1      ansible_host=192.168.1.20  ansible_user=ubuntu    ansible_ssh_private_key_file=~/.ssh/id_rsa

[all:vars]
ansible_python_interpreter=/usr/bin/python3
