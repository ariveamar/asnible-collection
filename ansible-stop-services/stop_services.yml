---
# stop_services.yml
# ─────────────────────────────────────────────────────────────────────────────
# Playbook : Stop Linux services by executing shell scripts from defined
#            directory locations on a target server.
#
# Usage    :
#   # Run with default IP defined in vars below
#   ansible-playbook -i inventory/hosts.ini stop_services.yml
#
#   # Override target IP at runtime
#   ansible-playbook -i inventory/hosts.ini stop_services.yml \
#       -e "target_host_ip=10.0.0.50"
#
#   # Continue even if one script fails
#   ansible-playbook -i inventory/hosts.ini stop_services.yml \
#       -e "ignore_script_errors=true"
#
#   # Dry run (validates paths without executing scripts)
#   ansible-playbook -i inventory/hosts.ini stop_services.yml --check
#
#   # Verbose output
#   ansible-playbook -i inventory/hosts.ini stop_services.yml -v
# ─────────────────────────────────────────────────────────────────────────────

- name: "STOP SERVICES — Execute stop scripts from defined directory locations"
  hosts: "{{ target_host_ip | default('app_servers') }}"
  become: true
  gather_facts: false

  vars:
    # ── TARGET SERVER IP ──────────────────────────────────────────────────────
    # IP of the server where the stop scripts will be executed.
    # Must match the ansible_host value defined in inventory/hosts.ini.
    # ─────────────────────────────────────────────────────────────────────────
    target_host_ip: "192.168.1.10"

    # ── STOP SCRIPT LOCATIONS ─────────────────────────────────────────────────
    # List of all services to stop.
    # The playbook loops through every entry and executes each script in order.
    #
    # Fields:
    #   label       : Friendly name shown in all output and logs
    #   script_dir  : Full path of the directory on the target host
    #   script_file : Shell script filename to execute
    #   args        : Optional arguments passed to the script (use "" for none)
    # ─────────────────────────────────────────────────────────────────────────
    stop_scripts:
      - label:       "App Service A"
        script_dir:  "/opt/services/app-a"
        script_file: "stop.sh"
        args:        ""

      - label:       "App Service B"
        script_dir:  "/opt/services/app-b"
        script_file: "stop.sh"
        args:        ""

      - label:       "Worker Service"
        script_dir:  "/home/deploy/worker"
        script_file: "stop-worker.sh"
        args:        "--graceful"

      - label:       "API Gateway"
        script_dir:  "/srv/gateway"
        script_file: "stop.sh"
        args:        ""

      - label:       "Background Scheduler"
        script_dir:  "/opt/scheduler"
        script_file: "shutdown.sh"
        args:        ""

    # ── EXECUTION SETTINGS ────────────────────────────────────────────────────
    stop_wait_seconds: 5         # Pause after each script before verifying
    script_timeout: 120          # Max seconds allowed for each script to finish
    ignore_script_errors: false  # true = continue loop even if a script fails

  roles:
    - stop_services
